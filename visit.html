<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Визитка Sebastian Kychatyi - Обратная сторона</title>
    <style>
        /* Настройки для экрана - те же, что и для лицевой стороны */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: 'Helvetica', Arial, sans-serif;
        }

        /* Фиксированный размер визитки 90x50мм (для печати) */
        .card-back {
            width: 90mm;
            height: 50mm;
            background-color: #000000; /* Черный фон для контраста с лицевой стороной */
            color: #ffffff;
            border: 1px solid #000; /* Контур для обрезки */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Центрирование по вертикали */
            align-items: center; /* Центрирование по горизонтали */
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); /* Тень для экрана */
        }

        /* Крупный стилизованный логотип (SK) */
        .logo-big {
            font-size: 35pt;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 2mm;
            border: 2px solid #fff;
            padding: 2mm 5mm;
            line-height: 1;
        }

        /* Название компании */
        .company-name {
            font-size: 10pt;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 5px; /* Большой межбуквенный интервал */
        }

        /* Маленький квадрат в углу для преемственности дизайна */
        .accent-square-white {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 6mm;
            height: 6mm;
            background-color: #ffffff;
        }

        /* СПЕЦИАЛЬНЫЕ НАСТРОЙКИ ДЛЯ ПЕЧАТИ */
        @media print {
            body {
                background: white;
            }
            .card-back {
                box-shadow: none;
                /* Чтобы визитка была в углу листа при печати */
                position: absolute;
                top: 0;
                left: 0;
                /* Для черно-белой печати без оттенков серого */
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

    <div class="card-back">
        <div class="accent-square-white"></div>

        <div class="logo-big">SK</div>
        
        <div class="company-name">Drivebook</div>
    </div>

</body>
</html>
